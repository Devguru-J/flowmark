<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flowmark - 로그인</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100..900&display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#1e1b19",
                        "outline": "#747686",

                        "on-tertiary-fixed-variant": "#4a4643",
                        "outline-variant": "#c4c5d6",
                        "surface-container-low": "#f3f4f3",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b8c3ff",
                        "paper": "#FAFAF9",
                        "inverse-surface": "#2f3130",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#66625d",
                        "on-primary-fixed": "#001355",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "night-ink": "#F5F5F4",
                        "surface-bright": "#f9f9f8",
                        "cobalt": "#3B5BDB",
                        "tertiary-fixed-dim": "#ccc5c1",
                        "error": "#ba1a1a",
                        "on-background": "#1a1c1c",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#1e1b17",
                        "secondary": "#625e59",
                        "surface-container-highest": "#e2e2e2",
                        "amber-signal": "#B45309",
                        "surface": "#FFFFFF",
                        "secondary-fixed-dim": "#ccc5bf",
                        "overdue-rust": "#C2410C",
                        "on-secondary-fixed-variant": "#4a4641",
                        "tertiary-fixed": "#e8e1dd",
                        "secondary-fixed": "#e8e1db",
                        "secondary-container": "#e5ded8",
                        "ink": "#1C1917",
                        "surface-variant": "#e2e2e2",
                        "night-hairline": "#2C2926",
                        "background": "#f9f9f8",

                        "on-surface": "#1a1c1c",

                        "hairline": "#E7E5E4",

                        "tertiary": "#524e4b",
                        "primary-fixed": "#dde1ff",
                        "on-primary-fixed-variant": "#0736ba",
                        "cobalt-wash": "#EDF2FF",
                        "on-surface-variant": "#444654",
                        "night-surface": "#1E1B19",
                        "surface-container": "#eeeeed",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#6b6663",
                        "surface-tint": "#3052d2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "huge": "48px",
                        "detail-width": "400px",

                        "xxl": "32px",

                    "fontFamily": {

                        "body-secondary": ["Pretendard"],

                        "screen-title": ["Geist", "sans-serif"]
                    },
                    "fontSize": {
                        "task-title": ["15px", { "lineHeight": "1.6", "fontWeight": "500" }],
                        "body-primary": ["15px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "section-label-korean": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "body-secondary": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "mono-label": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "section-label-latin": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "screen-title": ["22px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }]

                },
            },

<style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 1.25rem;
        }
        .geist-mono { font-family: 'Geist Mono', monospace; }
        .geist { font-family: 'Geist', sans-serif; }
    </style>
</head>
<body class="bg-surface text-ink antialiased overflow-hidden">
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Left Column: 5/12 Asymmetric Branding Panel -->
<section class="hidden md:flex md:w-5/12 bg-paper border-r border-hairline flex-col p-xxl justify-between">
<div class="space-y-sm">
<div class="flex items-center gap-sm">
<span class="font-screen-title text-screen-title text-cobalt tracking-tight">Flowmark</span>
</div>
<p class="font-body-primary text-body-primary text-graphite">
                    생각을 붙잡고, 바로 실행하세요
                </p>
</div>
<!-- Minimal Editorial Footer Meta -->
<div class="space-y-xs opacity-50">
<p class="font-section-label-latin text-section-label-latin uppercase tracking-widest text-graphite">V.2.4.0</p>
<p class="font-section-label-korean text-section-label-korean text-graphite">최고의 효율을 위한 도구</p>
</div>
</section>
<!-- Right Column: 7/12 Login Form Canvas -->
<section class="flex-1 bg-surface flex items-center justify-start px-xl md:px-huge py-huge">
<div class="w-full max-w-[360px] space-y-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Mobile Only Brand Header -->
<div class="md:hidden mb-huge space-y-xs">
<h1 class="font-screen-title text-screen-title text-cobalt tracking-tight">Flowmark</h1>
<p class="font-body-secondary text-body-secondary text-graphite">생각을 붙잡고, 바로 실행하세요</p>
</div>
<div class="space-y-md">
<h2 class="font-screen-title text-screen-title text-ink">로그인</h2>
</div>
<form action="#" class="space-y-lg" method="POST" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-xs">
<label class="block font-section-label-korean text-section-label-korean text-graphite" for="email">
                            이메일
                        </label>
<input class="w-full h-9 px-md bg-surface border border-hairline rounded-lg font-body-secondary text-body-secondary placeholder:text-fog focus:ring-2 focus:ring-cobalt focus:border-cobalt outline-none transition-all duration-200" id="email" name="email" placeholder="mail@flowmark.io" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-section-label-korean text-section-label-korean text-graphite" for="password">
                                비밀번호
                            </label>
<a class="font-section-label-korean text-section-label-korean text-cobalt hover:underline" href="#">
                                비밀번호 찾기
                            </a>
</div>
<input class="w-full h-9 px-md bg-surface border border-hairline rounded-lg font-body-secondary text-body-secondary placeholder:text-fog focus:ring-2 focus:ring-cobalt focus:border-cobalt outline-none transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Primary Action -->
<div class="pt-base">
<button class="w-full h-9 bg-cobalt text-white font-body-secondary text-body-secondary rounded-lg flex items-center justify-center hover:bg-primary active:translate-y-[1px] transition-all duration-150 shadow-sm" type="submit">
                            로그인
                        </button>
</div>
</form>
<!-- Footer Link -->
<div class="pt-lg border-t border-hairline">
<p class="font-body-secondary text-body-secondary text-graphite">
                        계정이 없으신가요? 
                        <a class="text-cobalt font-medium hover:underline ml-xs" href="#">회원가입</a>
</p>
</div>
</div>
</section>
</main>
<!-- Micro-interaction script for tactical feedback -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'translateY(1px)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = 'translateY(0px)';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = 'translateY(0px)';
            });
        });

        // Skeleton loading simulation (optional, just for "fast-feeling" entry)
        window.addEventListener('load', () => {
            console.log('Flowmark Ready');
        });
    </script>
</body></html>
