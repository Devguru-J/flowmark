<body class="bg-background text-ink font-body-primary selection:bg-cobalt-wash selection:text-cobalt">

</a>
<a class="flex items-center gap-sm text-secondary h-8 px-md hover:bg-surface-container transition-colors duration-200 rounded-lg group" href="#">

<a class="flex items-center gap-sm text-secondary h-8 px-md hover:bg-surface-container transition-colors duration-200 rounded-lg group" href="#">
<span class="material-symbols-outlined text-secondary group-hover:text-ink">archive</span>

</nav>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>

</a>

</div>

</div>

<!-- Main Content Area -->
<main class="flex-1 min-w-0 bg-paper overflow-y-auto">

</button>

</main>
<!-- Right Side Detail Track (Empty/Spaced for 3-column rhythm as per style guidance) -->
<div class="hidden xl:block w-[120px] bg-paper"></div>
</div>
<script>
        // Simple logic for the segmented control interaction
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                // If it's part of the theme toggle
                if (this.parentElement.classList.contains('bg-surface-container-low')) {
                    this.parentElement.querySelectorAll('button').forEach(b => {
                        b.className = "px-sm py-1 rounded-[6px] text-body-secondary font-body-secondary text-secondary hover:text-ink transition-colors press-effect";
                    });
                    this.className = "px-sm py-1 rounded-[6px] text-body-secondary font-body-secondary bg-surface text-cobalt shadow-sm border border-hairline/50 press-effect";
                }
            });
        });
    </script>
</body></html>
